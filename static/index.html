<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最短路径查询服务</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
            border-left: 4px solid #667eea;
        }
        #result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        .result-content {
            color: #555;
            line-height: 1.6;
        }
        .loading {
            text-align: center;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ 最短路径查询</h1>
        <p class="subtitle">基于Reactor模型的高并发查询服务</p>
        
        <form id="queryForm" onsubmit="return submitQuery(event)">
            <div class="form-group">
                <label for="start">起点地名</label>
                <input type="text" id="start" name="start" placeholder="例如：林1" required>
            </div>
            
            <div class="form-group">
                <label for="end">终点地名</label>
                <input type="text" id="end" name="end" placeholder="例如：林2" required>
            </div>
            
            <button type="submit">查询最短路径</button>
        </form>
        
        <div id="result">
            <div class="result-title">查询结果：</div>
            <div class="result-content" id="resultContent"></div>
        </div>
    </div>
    
    <script>
        function submitQuery(event) {
            event.preventDefault();
            
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            const resultDiv = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');
            
            resultDiv.classList.add('show');
            resultContent.innerHTML = '<div class="loading">查询中...</div>';
            
            fetch('/api/query?start=' + encodeURIComponent(start) + '&end=' + encodeURIComponent(end))
                .then(response => response.text())
                .then(data => {
                    resultContent.textContent = data;
                })
                .catch(error => {
                    resultContent.textContent = '查询失败：' + error;
                });
            
            return false;
        }
    </script>
</body>
</html>
