# Nginx 负载均衡配置
# 用于最短路径查询服务的高可用部署

# 定义后端服务器集群（单机多实例）
upstream shortest_path_cluster {
    # 负载均衡策略：round_robin（轮询，默认）
    # least_conn 在 Keep-Alive 下会导致负载不均
    # round_robin 会均匀分配请求到各个后端
    
    # 单机多实例：同一台服务器的不同端口
    # weight: 权重，数值越大分配的请求越多
    # max_fails: 最大失败次数，超过后标记为不可用
    # fail_timeout: 失败超时时间，在此时间内不再分配请求
    server 127.0.0.1:9090 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:9091 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:9092 weight=1 max_fails=3 fail_timeout=30s;
    
    # 保持与后端的长连接，提升性能
    keepalive 64;  # 增加连接池，支持高并发
}

# HTTP 服务器配置
server {
    listen 80;
    server_name 192.168.233.129;  # 服务器IP地址
    
    # 访问日志
    access_log /var/log/nginx/shortest_path_access.log;
    error_log /var/log/nginx/shortest_path_error.log;
    
    # 客户端请求体大小限制
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    
    # 代理超时设置（优化为高并发场景）
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    
    # 主页和API请求
    location / {
        proxy_pass http://shortest_path_cluster;
        
        # HTTP 1.1 支持（必须，用于 keepalive）
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # 传递客户端真实信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用缓冲，降低延迟
        proxy_buffering off;
        
        # 增加代理缓冲区，提升性能
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
        
        # 错误处理：后端故障时尝试下一个服务器
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }
    
    # 健康检查端点（可选，需要在server.cpp中实现）
    location /health {
        proxy_pass http://shortest_path_cluster;
        access_log off;
    }
    
    # Nginx 状态监控（可选）
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}